<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    h2 { color: #00bcd4; margin-bottom: 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-weight: 600; font-size: 13px; }
    .connected { background: #1b5e20; color: #a5d6a7; }
    .disconnected { background: #b71c1c; color: #ef9a9a; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #90a4ae; }
    input { width: 100%; padding: 8px; border: 1px solid #37474f; border-radius: 4px; background: #263238; color: #e0e0e0; margin-bottom: 12px; font-family: monospace; font-size: 12px; }
    input:focus { outline: none; border-color: #00bcd4; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
    .btn-connect { background: #00bcd4; color: #000; }
    .btn-connect:hover { background: #00e5ff; }
    .btn-disconnect { background: #455a64; color: #e0e0e0; }
    .btn-disconnect:hover { background: #546e7a; }
    .hint { font-size: 11px; color: #78909c; line-height: 1.5; margin-top: 8px; }
    code { background: #263238; padding: 2px 4px; border-radius: 2px; color: #00bcd4; }
  </style>
</head>
<body>
  <h2>Orthos Code</h2>
  <div id="status" class="status disconnected">Disconnected</div>

  <label for="token">Auth Token</label>
  <input id="token" type="text" value="orthos-local-dev" placeholder="Auth token (default: orthos-local-dev)">

  <label for="url">WebSocket URL</label>
  <input id="url" type="text" value="ws://127.0.0.1:18900">

  <button id="connectBtn" class="btn-connect">Connect</button>
  <button id="disconnectBtn" class="btn-disconnect">Disconnect</button>

  <p class="hint">
    Run <code>/browser start</code> in Orthos Code to start the server.
    The default token <code>orthos-local-dev</code> auto-connects.
    Click Connect if disconnected.
  </p>

  <script src="popup.js"></script>
</body>
</html>
